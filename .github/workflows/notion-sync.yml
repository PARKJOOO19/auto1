name: Notion Done Sync
on:
  pull_request:
    types: [closed]

jobs:
  update-notion:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Update Notion Status
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          # 1. PR 제목에서 이슈 번호(예: QA-1) 추출
          PR_TITLE="${{ github.event.pull_request.title }}"
          ISSUE_NUM=$(echo "$PR_TITLE" | grep -oE 'QA-[0-9]+' | grep -oE '[0-9]+' | head -n 1)

          if [ -z "$ISSUE_NUM" ]; then
            echo "❌ 알림: PR 제목에 숫자 번호가 없어 종료합니다."
            exit 0
          fi

          echo "🔍 고유 ID 번호 검색 중: $ISSUE_NUM"

          # 2. 고유 ID(Unique ID) 속성으로 페이지 찾기
          # 고유 ID 속성은 숫자 값으로 검색해야 합니다.
          QUERY_RESULT=$(curl -s -X POST "https://api.notion.com/v1/databases/$DATABASE_ID/query" \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data "{
              \"filter\": {
                \"property\": \"ID\",
                \"unique_id\": { \"equals\": $ISSUE_NUM }
              }
            }")

          PAGE_ID=$(echo "$QUERY_RESULT" | jq -r '.results[0].id')

          if [ "$PAGE_ID" == "null" ] || [ -z "$PAGE_ID" ]; then
            echo "❌ 오류: 노션 고유 ID #$ISSUE_NUM 항목을 찾을 수 없습니다."
            echo "응답 확인: $QUERY_RESULT"
            exit 1
          fi

          echo "✅ 페이지 발견: $PAGE_ID. 업데이트를 시도합니다."

          # 3. 상태 업데이트
          RESPONSE=$(curl -s -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            --data "{
              \"properties\": {
                \"상태\": { \"status\": { \"name\": \"완료\" } }
              }
            }")

          if echo "$RESPONSE" | grep -q "\"id\":"; then
            echo "🎉 성공: QA-$ISSUE_NUM 상태를 '완료'로 변경했습니다."
          else
            echo "❌ 업데이트 실패: $RESPONSE"
            exit 1
          fi
