name: Notion Done Sync
on:
  pull_request:
    types: [closed]

jobs:
  update-notion:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Update Notion Status
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          # PR 제목에서 이슈 번호(예: QA-1) 추출
          PR_TITLE="${{ github.event.pull_request.title }}"
          ISSUE_ID=$(echo "$PR_TITLE" | grep -oE 'QA-[0-9]+' | head -n 1)

          if [ -z "$ISSUE_ID" ]; then
            echo "제목에 이슈 번호가 없습니다."
            exit 0
          fi

          # 노션에서 해당 ID를 가진 페이지 찾기
          PAGE_ID=$(curl -s -X POST "https://api.notion.com/v1/databases/$DATABASE_ID/query" \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data "{
              \"filter\": {
                \"property\": \"ID\",
                \"title\": { \"equals\": \"$ISSUE_ID\" }
              }
            }" | jq -r '.results[0].id')

          # 상태를 '완료'로 업데이트
          if [ "$PAGE_ID" != "null" ]; then
            curl -s -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Notion-Version: 2022-06-28" \
              --data '{
                "properties": {
                  "상태": { "status": { "name": "완료" } }
                }
              }'
            echo "성공: $ISSUE_ID 상태를 완료로 변경했습니다."
          fi
