name: Notion Multi-Done Sync
on:
  pull_request:
    types: [closed]

jobs:
  update-notion:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Update Multiple Notion Issues
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          # 1. PR 제목에서 모든 이슈 번호 추출 (예: [QA-1][QA-2] -> 1 2)
          PR_TITLE="${{ github.event.pull_request.title }}"
          ISSUE_NUMS=$(echo "$PR_TITLE" | grep -oE 'QA-[0-9]+' | grep -oE '[0-9]+' | sort -u)

          if [ -z "$ISSUE_NUMS" ]; then
            echo "❌ 알림: 제목에 이슈 번호가 없어 종료합니다."
            exit 0
          fi

          echo "🔍 발견된 번호들: $ISSUE_NUMS"

          # 2. 발견된 번호를 하나씩 순서대로 처리
          for NUM in $ISSUE_NUMS; do
            echo "----------------------------------------"
            echo "⚙️ 작업 중: QA-$NUM"

            # 2-1. 해당 고유 ID 페이지 찾기
            QUERY_RESULT=$(curl -s -X POST "https://api.notion.com/v1/databases/$DATABASE_ID/query" \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              --data "{
                \"filter\": {
                  \"property\": \"ID\",
                  \"unique_id\": { \"equals\": $NUM }
                }
              }")

            PAGE_ID=$(echo "$QUERY_RESULT" | jq -r '.results[0].id')

            if [ "$PAGE_ID" == "null" ] || [ -z "$PAGE_ID" ]; then
              echo "⚠️ 경고: QA-$NUM 항목을 찾을 수 없어 건너뜁니다."
              continue
            fi

            # 2-2. 상태를 '완료'로 업데이트
            RESPONSE=$(curl -s -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Notion-Version: 2022-06-28" \
              --data "{
                \"properties\": {
                  \"상태\": { \"status\": { \"name\": \"완료\" } }
                }
              }")

            if echo "$RESPONSE" | grep -q "\"id\":"; then
              echo "✅ 완료: QA-$NUM 상태 변경 성공!"
            else
              echo "❌ 실패: QA-$NUM 처리 중 오류 발생"
            fi
          done
          echo "----------------------------------------"
          echo "🎉 모든 작업이 끝났습니다."
